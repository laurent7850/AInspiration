<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="150" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#60a5fa" opacity="0.1"/>
  <circle cx="900" cy="150" r="100" fill="#93c5fd" opacity="0.15"/>

  <!-- Logo placeholder (brain icon) -->
  <g transform="translate(100, 150)">
    <circle cx="50" cy="50" r="50" fill="white" opacity="0.9"/>
    <path d="M 35 40 Q 35 25 50 25 Q 65 25 65 40 Q 65 50 60 55 L 60 70 Q 60 75 55 75 L 45 75 Q 40 75 40 70 L 40 55 Q 35 50 35 40 Z"
          fill="url(#accentGradient)" opacity="0.9"/>
    <circle cx="45" cy="35" r="3" fill="white"/>
    <circle cx="55" cy="35" r="3" fill="white"/>
  </g>

  <!-- Main title -->
  <text x="220" y="280" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
    Aimagination
  </text>

  <!-- Subtitle -->
  <text x="220" y="350" font-family="Arial, sans-serif" font-size="42" fill="white" opacity="0.95">
    Solutions IA pour Entreprises
  </text>

  <!-- Tagline -->
  <text x="220" y="420" font-family="Arial, sans-serif" font-size="28" fill="white" opacity="0.85">
    Transformez votre business avec l'Intelligence Artificielle
  </text>

  <!-- CTA / URL -->
  <g transform="translate(220, 480)">
    <rect width="280" height="50" rx="25" fill="white" opacity="0.15"/>
    <text x="140" y="33" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" font-weight="600">
      aimagination.eu
    </text>
  </g>

  <!-- Decorative line -->
  <line x1="220" y1="370" x2="450" y2="370" stroke="url(#accentGradient)" stroke-width="3" opacity="0.6"/>
</svg>
