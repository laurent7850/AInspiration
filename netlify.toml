[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_APP_ENV = "production"
  VITE_SITE_URL = "https://ainspiration.eu"
  VITE_API_URL = "https://ainspiration.eu/api"
  VITE_DEBUG = "false"
  VITE_LOG_LEVEL = "error"
  VITE_ENABLE_DEVTOOLS = "false"
  VITE_ENABLE_ANALYTICS = "true"
  VITE_SHOW_DEBUG_PANEL = "false"

# Context: Deploy Previews (branches de feature / PR)
[context.deploy-preview]
  command = "npm run build:dev"

[context.deploy-preview.environment]
  VITE_APP_ENV = "development"
  VITE_DEBUG = "true"
  VITE_LOG_LEVEL = "debug"
  VITE_ENABLE_ANALYTICS = "false"
  VITE_SHOW_DEBUG_PANEL = "true"

# Context: Branch deploys
[context.branch-deploy]
  command = "npm run build:dev"

[context.branch-deploy.environment]
  VITE_APP_ENV = "development"
  VITE_DEBUG = "true"
  VITE_LOG_LEVEL = "debug"
  VITE_ENABLE_ANALYTICS = "false"

# Redirect old domain to new domain
[[redirects]]
  from = "https://aimagination.eu/*"
  to = "https://ainspiration.eu/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.aimagination.eu/*"
  to = "https://ainspiration.eu/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
