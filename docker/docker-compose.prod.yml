services:
  postgres:
    image: postgres:16-alpine
    container_name: ainspiration-postgres
    restart: always
    environment:
      POSTGRES_DB: ainspiration
      POSTGRES_USER: ainspiration
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5435:5432"
    volumes:
      - ainspiration_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainspiration -d ainspiration"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - root_default

  migration:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    command:
      - sh
      - -c
      - |
        psql -h ainspiration-postgres -U ainspiration -d ainspiration -c "SELECT 1;" && echo DB connection OK || echo DB connection FAILED
        exit 0
    networks:
      - root_default
    restart: "no"

  web:
    image: node:20-alpine
    container_name: ainspiration-web
    working_dir: /app
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ainspiration:${DB_PASSWORD}@ainspiration-postgres:5432/ainspiration
      JWT_SECRET: ${JWT_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      N8N_BASE: https://n8n.srv767464.hstgr.cloud/webhook
      WEBHOOK_SECRET: seopilot-ainspiration-secret-2026
      PORT: "3000"
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl > /dev/null 2>&1
        echo "Waiting 15s for migration to reset password..."
        sleep 15
        NETLIFY=https://ainspiration2026.netlify.app
        GHRAW=https://raw.githubusercontent.com/laurent7850/AInspiration/main
        echo Downloading server.js...
        curl -fsSL $${GHRAW}/docker/backend/server.js -o /app/server.js
        echo Installing deps...
        cd /app
        npm init -y 2>/dev/null || true
        npm install express@4 pg@8 jsonwebtoken@9 bcryptjs@2 uuid@9 cors dotenv 2>&1 | tail -1
        echo Downloading frontend from manifest...
        curl -fsSL $${GHRAW}/docker/dist-manifest.txt -o /tmp/manifest.txt
        while IFS= read -r f; do
          dir=$$(dirname "$$f")
          mkdir -p "/app/dist/$$dir"
          curl -fsSL "$${NETLIFY}/$$f" -o "/app/dist/$$f" 2>/dev/null || true
        done < /tmp/manifest.txt
        echo "Frontend: $$(find /app/dist -type f | wc -l) files"
        echo Starting server...
        exec node /app/server.js
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ainspiration.rule=Host(`ainspiration.eu`)"
      - "traefik.http.routers.ainspiration.entrypoints=websecure"
      - "traefik.http.routers.ainspiration.tls.certresolver=letsencrypt"
      - "traefik.http.services.ainspiration.loadbalancer.server.port=3000"
      - "traefik.http.routers.ainspiration-www.rule=Host(`www.ainspiration.eu`)"
      - "traefik.http.routers.ainspiration-www.entrypoints=websecure"
      - "traefik.http.routers.ainspiration-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ainspiration-www.middlewares=ainspiration-www-redirect"
      - "traefik.http.middlewares.ainspiration-www-redirect.redirectregex.regex=^https://www\\.ainspiration\\.eu/(.*)"
      - "traefik.http.middlewares.ainspiration-www-redirect.redirectregex.replacement=https://ainspiration.eu/$${1}"
      - "traefik.http.middlewares.ainspiration-www-redirect.redirectregex.permanent=true"
      - "traefik.docker.network=root_default"
    networks:
      - root_default

volumes:
  ainspiration_pgdata:

networks:
  root_default:
    external: true
