version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ainspiration-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ainspiration
      POSTGRES_USER: ainspiration
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ainspiration-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ainspiration -d ainspiration"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./docker/backend
      dockerfile: Dockerfile
    container_name: ainspiration-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ainspiration
      DB_USER: ainspiration
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ainspiration-internal
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ainspiration-api.rule=Host(`ainspiration.eu`, `www.ainspiration.eu`, `ainspiration.srv767464.hstgr.cloud`) && PathPrefix(`/api`)"
      - "traefik.http.routers.ainspiration-api.entrypoints=websecure"
      - "traefik.http.routers.ainspiration-api.tls=true"
      - "traefik.http.routers.ainspiration-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.ainspiration-api.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (nginx serving static files)
  frontend:
    image: nginx:alpine
    container_name: ainspiration-web
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_html:/usr/share/nginx/html
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Downloading frontend from Netlify..."
        apk add --no-cache wget unzip
        cd /usr/share/nginx/html
        rm -rf *
        wget -q "https://ainspiration2026.netlify.app/" -O index.html
        wget -q --recursive --no-parent --no-host-directories --reject "index.html*" "https://ainspiration2026.netlify.app/assets/" -P /usr/share/nginx/html/ 2>/dev/null || true
        wget -q --recursive --no-parent --no-host-directories "https://ainspiration2026.netlify.app/locales/" -P /usr/share/nginx/html/ 2>/dev/null || true
        echo "Download complete. Starting nginx..."
        nginx -g 'daemon off;'
    networks:
      - root_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ainspiration.rule=Host(`ainspiration.eu`, `www.ainspiration.eu`, `ainspiration.srv767464.hstgr.cloud`)"
      - "traefik.http.routers.ainspiration.entrypoints=websecure"
      - "traefik.http.routers.ainspiration.tls=true"
      - "traefik.http.routers.ainspiration.tls.certresolver=letsencrypt"
      - "traefik.http.services.ainspiration.loadbalancer.server.port=80"
      # Priorité plus basse que l'API pour que /api soit routé vers le backend
      - "traefik.http.routers.ainspiration.priority=1"
      - "traefik.http.routers.ainspiration-api.priority=10"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ainspiration-internal:
    driver: bridge
  root_default:
    external: true

volumes:
  postgres_data:
  frontend_html:
