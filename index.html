    <!-- Critical CSS inline pour le loader initial -->
    <style>
      /* Minimal critical CSS for initial loader */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(to bottom, #eef2ff, #ffffff);
        z-index: 9999;
        transition: opacity 0.3s ease-out;
      }
      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e0e7ff;
        border-top-color: #4f46e5;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Initial loader pendant le chargement JS -->
    <div id="initial-loader" class="initial-loader">
      <div class="loader-spinner"></div>
    </div>

    <div id="root">
      <!-- Contenu initial pour crawlers SEO (remplacé par React au chargement) -->
      <h1>Gagnez 10h par semaine grâce à l'IA</h1>
      <p>Rejoignez les PME qui automatisent leurs tâches répétitives et boostent leur chiffre d'affaires avec nos solutions d'Intelligence Artificielle.</p>
    </div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Script pour cacher le loader initial -->
    <script>
      window.addEventListener('load', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(function() { loader.remove(); }, 300);
        }
      });
    </script>
  </body>
